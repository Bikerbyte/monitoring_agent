---
- name: Deploy SRE monitoring agent
  hosts: sre_monitoring_agents
  become: true
  gather_facts: false

  vars:
    agent_app_dir: /opt/sre-monitoring-agent
    agent_logrotate_path: /etc/logrotate.d/sre-monitoring-agent
    agent_service_path: /etc/systemd/system/sre-monitoring-agent.service

  tasks:
    - name: Ensure Python 3 is installed
      ansible.builtin.package:
        name: python3
        state: present

    - name: Create agent application directory
      ansible.builtin.file:
        path: "{{ agent_app_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy monitoring agent script
      ansible.builtin.copy:
        src: ../../monitoring_agent.py
        dest: "{{ agent_app_dir }}/monitoring_agent.py"
        owner: root
        group: root
        mode: "0755"
      notify: Restart sre monitoring agent

    - name: Deploy systemd service
      ansible.builtin.copy:
        src: ../../sre-monitoring-agent.service
        dest: "{{ agent_service_path }}"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart sre monitoring agent

    - name: Deploy logrotate config
      ansible.builtin.copy:
        src: ../logrotate/sre-monitoring-agent
        dest: "{{ agent_logrotate_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Enable and start service
      ansible.builtin.systemd:
        name: sre-monitoring-agent
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart sre monitoring agent
      ansible.builtin.systemd:
        name: sre-monitoring-agent
        state: restarted
